version: '3.8'

services:
  # ─────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: chatbot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: chatbot_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - chatbot-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # ChromaDB Vector Database
  # ─────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: chatbot-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - chatbot-network
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend API Server
  # ─────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatbot-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/chatbot_db?authSource=admin
      - CHROMA_URL=http://chromadb:8000
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - RESTAURANT_NAME=${RESTAURANT_NAME:-Kalai Restaurant}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./knowledge-base:/app/knowledge-base
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - chatbot-network

  # ─────────────────────────────────────────
  # Frontend (Production Build)
  # ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chatbot-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - chatbot-network

volumes:
  mongodb_data:
    driver: local
  chroma_data:
    driver: local

networks:
  chatbot-network:
    driver: bridge
